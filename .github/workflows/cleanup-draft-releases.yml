name: Cleanup draft releases (one-shot)

# One-shot manual cleanup of six stale, duplicated DRAFT releases left over from
# earlier release attempts. Run it once from the Actions tab (Run workflow), then
# this file is removed in a follow-up PR. It deletes strictly by numeric release
# ID and only after confirming each is a draft — several of these drafts reuse
# the tag names of PUBLISHED releases (v1.1.2 / v1.1.3), so deleting by tag would
# be unsafe; deleting by ID with a draft check is not.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-drafts:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale draft releases (drafts only, by ID)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The six leftover draft release IDs to remove.
          IDS="352455584 352455583 352453894 352453893 352453892 352345709"
          deleted=0
          for id in $IDS; do
            echo "=== Release $id ==="
            draft=$(gh api "/repos/$REPO/releases/$id" --jq '.draft' 2>/dev/null || echo "missing")
            if [ "$draft" = "true" ]; then
              name=$(gh api "/repos/$REPO/releases/$id" --jq '.name // "(no name)"')
              gh api -X DELETE "/repos/$REPO/releases/$id"
              echo "Deleted draft $id (\"$name\")"
              deleted=$((deleted + 1))
            elif [ "$draft" = "false" ]; then
              echo "SKIPPED $id — this is a PUBLISHED release, not a draft. Left untouched."
            else
              echo "SKIPPED $id — not found (already deleted?)."
            fi
          done
          echo "::notice::Deleted $deleted draft release(s). Safe to remove this workflow now."
